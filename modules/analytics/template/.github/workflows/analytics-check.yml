# Soft analytics reminder (from apps-tooling/modules/analytics).
# If a PR changes feature code but no analytics, post a non-blocking reminder.
# It cannot verify the RIGHT events were added — human review + the PR checklist
# are the real gate. This never fails the build.
name: Analytics reminder

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  analytics-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number, per_page: 100,
            });
            const paths = files.map(f => f.filename);

            // Feature code that usually warrants events vs. the analytics layer.
            const featureRe = /^(app|src|components|screens|hooks)\//;
            const analyticsRe = /(^|\/)lib\/analytics\//;

            const touchedFeature = paths.some(p => featureRe.test(p));
            const touchedAnalytics = paths.some(p => analyticsRe.test(p));
            // Also accept a new track(...) call added anywhere in the diff.
            const addedTrackCall = files.some(f =>
              (f.patch || '').split('\n').some(l => l.startsWith('+') && /\btrack\(/.test(l))
            );

            const needsReminder = touchedFeature && !touchedAnalytics && !addedTrackCall;

            const marker = '<!-- analytics-reminder -->';
            const reminder = [
              marker,
              '📊 **Analytics reminder**',
              '',
              'This PR changes feature code (`app/`, `src/`, `components/`, `screens/`, `hooks/`) ' +
              'but does not touch `lib/analytics/` or add a `track()` call.',
              '',
              'If it adds or changes user-facing behaviour, add/update events per the ' +
              'event guidelines (`apps-tooling/modules/analytics/event-guidelines.md`). ' +
              'If not (refactor / bugfix / styling / docs), tick **Not applicable** in the PR checklist.',
              '',
              '_Non-blocking reminder._',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: pull_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (needsReminder) {
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: reminder });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body: reminder });
              }
            } else if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id,
                body: marker + '\n✅ Analytics reminder resolved (analytics updated or N/A).',
              });
            }
